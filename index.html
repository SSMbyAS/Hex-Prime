<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEX-PRIME SMM PANEL</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; width: 100%; max-width: 400px; box-sizing: border-box; margin-top: 50px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .msg { font-size: 12px; margin-top: 10px; color: #fbbf24; }
        #main-panel { display: none; width: 100%; max-width: 450px; }
        .logout-btn { background: #ef4444; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; float: right; border:none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card">
        <h2 style="text-align:center; color:var(--primary)">HEX-PRIME</h2>
        <div id="login-form">
            <input type="text" id="u" placeholder="Username">
            <input type="password" id="p" placeholder="Password">
            <button class="btn" onclick="login()">LOGIN</button>
            <p onclick="showSignup()" style="text-align:center; font-size:13px; cursor:pointer; color:var(--primary)">Naya Account? Signup</p>
        </div>
        <div id="signup-form" style="display:none;">
            <input type="text" id="su" placeholder="Username">
            <input type="email" id="se" placeholder="Gmail">
            <input type="number" id="sp" placeholder="Phone">
            <input type="password" id="spass" placeholder="Password">
            <button class="btn" onclick="signup()">CREATE ACCOUNT</button>
            <p onclick="showLogin()" style="text-align:center; font-size:13px; cursor:pointer; color:var(--primary)">Pehle se account hai? Login</p>
        </div>
        <p id="status" class="msg"></p>
    </div>
</div>

<div id="main-panel">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <h2>Dashboard</h2>
    <div class="card">
        <label>Category</label>
        <select id="cat" onchange="updateServices()">
            <option value="">Choose...</option>
            <option value="ig">Instagram Services</option>
            <option value="fb">Facebook Services</option>
        </select>
        <label>Service</label>
        <select id="ser"></select>
        <input type="text" placeholder="Paste Link Here">
        <button class="btn" style="background:#22c55e">Place Order</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzh3uRQQ6vDP5QSK0aUNGuZQ_QxmFhM9dqlu-uwe5B8Hx3vLB8UIiMmQKRaK53WY2Hg/exec';

    // Session Check
    if(localStorage.getItem('hexLogin') === 'true') {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
    }

    function showSignup() { document.getElementById('login-form').style.display='none'; document.getElementById('signup-form').style.display='block'; }
    function showLogin() { document.getElementById('login-form').style.display='block'; document.getElementById('signup-form').style.display='none'; }

    async function signup() {
        const data = {
            action: 'signup',
            user: document.getElementById('su').value,
            email: document.getElementById('se').value,
            phone: document.getElementById('sp').value,
            pass: document.getElementById('spass').value
        };
        if(!data.user || !data.pass) return alert("All fields required!");
        
        document.getElementById('status').innerText = "Registering... (Please wait 5-10 sec)";
        
        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Signup Success! Ab Login Karein.");
            showLogin();
        } catch(e) { 
            document.getElementById('status').innerText = "Error: " + e.message;
        }
    }

    async function login() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        if(!u || !p) return alert("Fill details!");

        document.getElementById('status').innerText = "Checking...";
        try {
            const res = await fetch(`${scriptURL}?action=checkUser&user=${u}&pass=${p}`);
            const text = await res.text();
            if(text.trim() === "Valid") {
                localStorage.setItem('hexLogin', 'true');
                location.reload();
            } else {
                document.getElementById('status').innerText = "Galat Username/Password!";
            }
        } catch(e) {
            document.getElementById('status').innerText = "Error: Database se connect nahi ho raha.";
        }
    }

    function logout() { localStorage.clear(); location.reload(); }

    function updateServices() {
        const cat = document.getElementById('cat').value;
        const ser = document.getElementById('ser');
        ser.innerHTML = "";
        if(cat === 'ig') {
            ser.add(new Option("Instagram Likes - ₹5", "5"));
            ser.add(new Option("Instagram Followers - ₹45", "45"));
        } else if(cat === 'fb') {
            ser.add(new Option("Facebook Likes - ₹10", "10"));
        }
    }
</script>
</body>
</html>
