<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Wallet Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --accent: #22c55e; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        
        /* Wallet Header */
        .wallet-card { background: linear-gradient(135deg, #38bdf8, #1d4ed8); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .balance-amt { font-size: 32px; font-weight: 900; margin: 10px 0; }
        .add-fund-btn { background: white; color: #1d4ed8; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; }

        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-size: 12px; color: #94a3b8; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; }
        .btn-buy { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* Modal for adding funds */
        #fundModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1001; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-card">
        <p style="margin:0; font-size:14px; opacity:0.9;">Available Balance</p>
        <div class="balance-amt">₹<span id="userBalance">0.00</span></div>
        <button class="add-fund-btn" onclick="openFundModal()"><i class="fas fa-plus"></i> Add Funds</button>
    </div>

    <div class="card">
        <label>TARGET LINK</label>
        <input type="text" id="targetLink" placeholder="https://instagram.com/...">

        <label>SELECT SERVICE</label>
        <select id="serviceSelect" onchange="updatePriceDisplay()">
            <option value="">-- Choose Package --</option>
            <option value='{"name":"1k Views","price":4}'>Instagram 1k Views - ₹4</option>
            <option value='{"name":"1k Followers","price":35}'>Instagram 1k Followers - ₹35</option>
        </select>

        <div id="priceMsg" style="text-align:center; margin:10px; color:#38bdf8; font-weight:bold;"></div>
        <button class="btn-buy" onclick="buyService()">Place Order (Pay from Wallet)</button>
    </div>
</div>

<div id="fundModal">
    <div class="card" style="width:90%; max-width:400px; position:relative;">
        <button onclick="closeFundModal()" style="position:absolute; right:15px; top:15px; background:none; border:none; color:white; font-size:20px;">×</button>
        <h3>Add Money to Wallet</h3>
        <p style="font-size:12px; color:#94a3b8;">Pay via UPI and enter UTR to update balance.</p>
        <center>
            <img id="qrImg" style="width:150px; border:5px solid white; border-radius:10px; margin:10px;">
        </center>
        <input type="number" id="fundAmt" placeholder="Enter Amount (₹)" oninput="updateQR()">
        <input type="number" id="fundUTR" placeholder="Enter 12-digit UTR">
        <button class="btn-buy" style="background:#38bdf8" onclick="submitFund()">Submit Fund Request</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "AAPKA_NEW_SCRIPT_URL_HERE";
    
    // Page load par Local Balance check karein
    let balance = parseFloat(localStorage.getItem("wallet_bal") || "0");
    document.getElementById("userBalance").innerText = balance.toFixed(2);

    function updatePriceDisplay() {
        const s = document.getElementById("serviceSelect").value;
        if(s) {
            const data = JSON.parse(s);
            document.getElementById("priceMsg").innerText = "Price: ₹" + data.price;
        }
    }

    function openFundModal() { document.getElementById("fundModal").style.display = "flex"; }
    function closeFundModal() { document.getElementById("fundModal").style.display = "none"; }

    function updateQR() {
        const amt = document.getElementById("fundAmt").value;
        const upi = `upi://pay?pa=7388720012@fam&am=${amt}&cu=INR`;
        document.getElementById("qrImg").src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(upi)}`;
    }

    async function submitFund() {
        const amt = document.getElementById("fundAmt").value;
        const utr = document.getElementById("fundUTR").value;
        if(!amt || utr.length < 12) return alert("Pehle Sahi Amount aur UTR daalein!");

        // Request Sheet par bhejenge (Aapko admin panel se approve karna hoga)
        alert("✅ Fund request sent! After verification, balance will be added.");
        closeFundModal();
    }

    async function buyService() {
        const link = document.getElementById("targetLink").value;
        const sVal = document.getElementById("serviceSelect").value;
        
        if(!link || !sVal) return alert("Details fill karein!");
        
        const service = JSON.parse(sVal);
        
        // 1. Balance Check
        if(balance < service.price) {
            alert("❌ Recharge Maang Raha Hai! (Low Balance)");
            return;
        }

        // 2. Paisa Kato
        balance -= service.price;
        localStorage.setItem("wallet_bal", balance);
        document.getElementById("userBalance").innerText = balance.toFixed(2);

        // 3. Order Sheet mein bhejo
        alert(`✅ Order Placed! ₹${service.price} aapke wallet se kat gaye. Bacha hua: ₹${balance.toFixed(2)}`);
        
        // Yahan fetch() call karke sheet mein data bhej dein
    }
</script>
</body>
</html>
