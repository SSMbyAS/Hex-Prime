        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 30px; }
        
        .container { max-width: 500px; margin: auto; }
        .header { text-align: center; padding: 20px 0; }
        .logo { font-size: 28px; font-weight: 900; color: var(--primary); text-transform: uppercase; }

        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; margin-bottom: 20px; }
        
        label { display: block; margin: 15px 0 5px; font-size: 12px; color: #94a3b8; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 15px; outline: none; margin-bottom: 10px; }
        
        .price-tag { background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 15px; border-radius: 10px; text-align: center; font-size: 26px; font-weight: 800; margin: 15px 0; border: 1px dashed var(--primary); }
        
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.6; }

        .qr-section { text-align: center; display: none; padding-top: 20px; border-top: 1px solid #334155; }
        .qr-img { width: 180px; border: 4px solid white; border-radius: 10px; margin: 10px 0; }

        .history-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .refresh-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        .order-item { background: #0f172a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #facc15; }
        .status-success { border-left-color: var(--accent) !important; }
        .status-rejected { border-left-color: var(--error) !important; }

        .float-wa { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: white; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
