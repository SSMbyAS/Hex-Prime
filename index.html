<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growfam | MRSMM Style Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0081ff; --bg: #f4f7fe; --card: #ffffff; --text: #1b2559; --gray: #a3aed0; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { background: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; }
        .screen { display: none; max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; }
        .active { display: block; }

        /* LOGIN & REGISTER */
        .auth-header { padding: 50px 20px; text-align: center; background: var(--blue); color: white; border-radius: 0 0 30px 30px; }
        .auth-card { background: white; margin: -30px 20px 20px; padding: 30px 20px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .inp { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e0e5f2; margin-bottom: 15px; outline: none; background: #f9fbff; }
        .btn-main { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--blue); color: white; font-weight: 800; cursor: pointer; }

        /* MRSMM DASHBOARD STYLE */
        .top-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: white; }
        .balance-card { background: white; margin: 15px; padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; }
        .icon-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* CATEGORY SCROLL */
        .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 15px; scrollbar-width: none; }
        .cat-item { min-width: 60px; height: 60px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--gray); cursor: pointer; border: 2px solid transparent; }
        .cat-item.active { border-color: var(--blue); color: var(--blue); background: #eef6ff; }

        /* ADMIN TABLE */
        .admin-box { background: white; margin: 10px; border-radius: 15px; padding: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 10px; background: #f4f7fe; color: var(--gray); }
        td { padding: 10px; border-bottom: 1px solid #f4f7fe; }
        
        .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; display: flex; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-link { flex: 1; text-align: center; font-size: 10px; color: var(--gray); cursor: pointer; }
        .nav-link.active { color: var(--blue); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-header"><h1>GROWFAM</h1><p>Login to your account</p></div>
        <div class="auth-card">
            <input type="text" id="l-user" class="inp" placeholder="Username">
            <input type="password" id="l-pass" class="inp" placeholder="Password">
            <button class="btn-main" onclick="login()">Login</button>
            <p style="text-align:center; font-size:12px; margin-top:15px;">Account nahi hai? <a href="javascript:void(0)" onclick="showReg(true)">Sign Up</a></p>
        </div>
    </div>

    <div id="reg-screen" class="screen">
        <div class="auth-header"><h1>JOIN US</h1><p>Create a new account</p></div>
        <div class="auth-card">
            <input type="text" id="r-user" class="inp" placeholder="Username">
            <input type="email" id="r-email" class="inp" placeholder="Gmail Address">
            <input type="number" id="r-phone" class="inp" placeholder="Phone Number">
            <input type="password" id="r-pass" class="inp" placeholder="Password">
            <button class="btn-main" onclick="register()">Create Account</button>
            <p style="text-align:center; font-size:12px; margin-top:15px;"><a href="javascript:void(0)" onclick="showReg(false)">Wapas Login karein</a></p>
        </div>
    </div>

    <div id="dash-screen" class="screen">
        <div class="top-nav">
            <b style="font-size:20px; color:var(--blue)">MRSMM.ORG</b>
            <i class="fa-solid fa-user-shield" onclick="openAdmin()" style="font-size:20px; color:var(--gray)"></i>
        </div>

        <div class="balance-card">
            <div class="icon-circle" style="background:#eef6ff; color:var(--blue);"><i class="fa-solid fa-wallet"></i></div>
            <div><small style="color:var(--gray)">Available Balance</small><h2 style="margin:0" id="u-bal">₹0.00</h2></div>
        </div>

        <div class="cat-scroll">
            <div class="cat-item active" onclick="setCat('tiktok', this)"><i class="fa-brands fa-tiktok"></i></div>
            <div class="cat-item" onclick="setCat('insta', this)"><i class="fa-brands fa-instagram"></i></div>
            <div class="cat-item" onclick="setCat('yt', this)"><i class="fa-brands fa-youtube"></i></div>
            <div class="cat-item" onclick="setCat('fb', this)"><i class="fa-brands fa-facebook"></i></div>
        </div>

        <div style="padding:20px;">
            <select id="srv" class="inp" onchange="calc()"></select>
            <input type="text" id="link" class="inp" placeholder="Link">
            <input type="number" id="qty" class="inp" placeholder="Quantity" oninput="calc()">
            <div style="background:white; padding:15px; border-radius:15px; text-align:center; margin-bottom:15px;">
                <p style="margin:0; color:var(--gray)">Charge</p>
                <h1 style="margin:0; color:var(--blue)" id="charge">₹0.00</h1>
            </div>
            <button class="btn-main" onclick="order()">Place Order</button>
        </div>

        <div class="nav-bottom">
            <div class="nav-link active" onclick="go('dash-screen')"><i class="fa-solid fa-house"></i><br>Home</div>
            <div class="nav-link" onclick="go('hist-screen')"><i class="fa-solid fa-list"></i><br>Orders</div>
            <div class="nav-link" onclick="location.reload()"><i class="fa-solid fa-sign-out"></i><br>Logout</div>
        </div>
    </div>

    <div id="admin-screen" class="screen">
        <div style="padding:20px; background:var(--blue); color:white;"><h3>Admin Control</h3></div>
        
        <div class="admin-box">
            <h4>Add Funds</h4>
            <input type="text" id="a-user" class="inp" placeholder="Username">
            <input type="number" id="a-amt" class="inp" placeholder="Amount">
            <button class="btn-main" onclick="addFund()" style="background:#05cd99">Add Cash</button>
        </div>

        <div class="admin-box">
            <h4>User Database (Passwords/Gmail/Phone)</h4>
            <table>
                <thead><tr><th>User (Pass)</th><th>Contact Info</th><th>Balance</th></tr></thead>
                <tbody id="user-table"></tbody>
            </table>
        </div>
        <button class="btn-main" style="width:90%; margin:20px; background:var(--gray)" onclick="go('dash-screen')">Back to Dashboard</button>
    </div>

    <div id="hist-screen" class="screen">
        <div style="padding:20px;"><h3>My Orders</h3></div>
        <div class="admin-box">
            <table id="my-orders"></table>
        </div>
        <button class="btn-main" style="width:90%; margin:20px; background:var(--gray)" onclick="go('dash-screen')">Back</button>
    </div>

    <script>
        // Database Initialization
        let db = JSON.parse(localStorage.getItem('mrsmm_db')) || {
            'suhel': {pass:'7388', email:'suhel@gmail.com', phone:'1234567890', bal:1000, orders:[]}
        };
        let currentUser = null;

        const services = {
            'tiktok': [{n:'TikTok Followers', r:0.20}, {n:'TikTok Likes', r:0.05}],
            'insta': [{n:'Insta Real Likes', r:6.16}, {n:'Insta Followers', r:18.97}],
            'yt': [{n:'YT Watchtime', r:150}],
            'fb': [{n:'FB Page Likes', r:45}]
        };

        function showReg(t) { go(t ? 'reg-screen' : 'login-screen'); }

        function register() {
            let u = document.getElementById('r-user').value.toLowerCase();
            let e = document.getElementById('r-email').value;
            let ph = document.getElementById('r-phone').value;
            let p = document.getElementById('r-pass').value;
            if(!u || !p || !e) return alert("Poori detail bharo!");
            db[u] = {pass:p, email:e, phone:ph, bal:0, orders:[]};
            save(); alert("Account ban gaya! Login karein.");
            showReg(false);
        }

        function login() {
            let u = document.getElementById('l-user').value.toLowerCase();
            let p = document.getElementById('l-pass').value;
            if(db[u] && db[u].pass === p) { currentUser = u; setupDash(); go('dash-screen'); }
            else alert("Ghalat details!");
        }

        function setupDash() {
            document.getElementById('u-bal').innerText = "₹" + db[currentUser].bal.toFixed(2);
            setCat('insta');
        }

        function setCat(c, el) {
            if(el) { document.querySelectorAll('.cat-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
            document.getElementById('srv').innerHTML = services[c].map(s=>`<option value="${s.r}">${s.n} (₹${s.r})</option>`).join('');
            calc();
        }

        function calc() {
            let r = document.getElementById('srv').value;
            let q = document.getElementById('qty').value || 0;
            document.getElementById('charge').innerText = "₹" + ((r/1000)*q).toFixed(2);
        }

        function order() {
            let charge = parseFloat(document.getElementById('charge').innerText.replace('₹',''));
            if(db[currentUser].bal < charge) return alert("Paisa nahi hai!");
            let id = Math.floor(Math.random()*900000)+100000;
            db[currentUser].bal -= charge;
            db[currentUser].orders.push({id:id, charge:charge, status:'Pending'});
            save(); setupDash(); alert("Order ID: "+id);
        }

        function openAdmin() {
            let p = prompt("Enter Master Key:");
            if(p === "suhel7388") { 
                go('admin-screen');
                let html = "";
                for(let u in db) {
                    html += `<tr><td><b>${u}</b><br>(${db[u].pass})</td><td>${db[u].email}<br>${db[u].phone}</td><td>₹${db[u].bal}</td></tr>`;
                }
                document.getElementById('user-table').innerHTML = html;
            }
        }

        function addFund() {
            let u = document.getElementById('a-user').value.toLowerCase();
            let a = parseFloat(document.getElementById('a-amt').value);
            if(db[u]) { db[u].bal += a; save(); alert("Added!"); openAdmin(); }
        }

        function go(id) { 
            document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        function save() { localStorage.setItem('mrsmm_db', JSON.stringify(db)); }
    </script>
</body>
</html>
