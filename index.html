<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Professional Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --accent: #22c55e; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 80px; }
        
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); letter-spacing: 1px; }

        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; max-width: 500px; margin: auto; }
        
        label { display: block; margin: 15px 0 5px; font-size: 13px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 15px; outline: none; }
        
        .price-tag { background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 15px; border-radius: 10px; text-align: center; font-size: 24px; font-weight: 800; margin: 20px 0; border: 1px dashed var(--primary); }
        
        .qr-section { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155; display: none; }
        .qr-img { width: 200px; border: 5px solid white; border-radius: 10px; margin: 10px 0; }
        
        .btn-order { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-order:disabled { background: #64748b; cursor: not-allowed; }

        /* Floating WhatsApp */
        .float-wa { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">SMMbyAS</div>
    <p style="font-size: 12px; color: #94a3b8;">Fast & Trusted Services</p>
</div>

<div class="card">
    <label><i class="fas fa-link"></i> Target Link</label>
    <input type="text" id="targetLink" placeholder="Paste Video/Profile Link here...">

    <label><i class="fas fa-list"></i> Category</label>
    <select id="categorySelect" onchange="updateServices()">
        <option value="">-- Select Category --</option>
        <option value="insta">Instagram Services ❤️</option>
        <option value="yt">YouTube Services 🎬</option>
    </select>

    <label><i class="fas fa-box-open"></i> Package</label>
    <select id="serviceSelect" onchange="updatePriceDisplay()">
        <option value="">Choose Category First</option>
    </select>

    <div class="price-tag" id="priceDisplay">₹0.00</div>

    <button class="btn-order" id="payBtn" onclick="showPayment()">Pay & Place Order</button>

    <div id="qrSection" class="qr-section">
        <p style="color: #facc15; font-weight: bold;">Scan to Pay: ₹<span id="finalAmt">0</span></p>
        <img src="" id="qrImg" class="qr-img">
        <p style="font-size: 12px; margin-bottom: 15px;">UPI: 7388720012@fam</p>
        
        <label>Enter 12-Digit UTR Number</label>
        <input type="number" id="utrInput" placeholder="Enter UPI Ref No. (12 Digits)">
        <button class="btn-order" style="background: #38bdf8; margin-top: 15px;" id="confirmBtn" onclick="submitToSheet()">Confirm Payment</button>
    </div>
</div>

<a href="https://wa.me/917388720012" class="float-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
    const services = {
        "insta": [
            { name: "Instagram 10k Views", price: 4 },
            { name: "Instagram 1k Likes", price: 10 },
            { name: "Instagram 1k Followers", price: 36 },
            { name: "Instagram 1k Shares", price: 2 }
        ],
        "yt": [
            { name: "YouTube 100 Subs", price: 180 },
            { name: "YouTube 1k Views", price: 60 },
            { name: "YouTube 1k Likes", price: 8 }
        ]
    };

    function updateServices() {
        const cat = document.getElementById("categorySelect").value;
        const sSelect = document.getElementById("serviceSelect");
        sSelect.innerHTML = "";
        
        if (cat && services[cat]) {
            services[cat].forEach(s => {
                let opt = document.createElement("option");
                opt.value = JSON.stringify(s);
                opt.text = `${s.name} - ₹${s.price}`;
                sSelect.add(opt);
            });
        } else {
            sSelect.add(new Option("Choose Category First", ""));
        }
        updatePriceDisplay();
    }

    function updatePriceDisplay() {
        const val = document.getElementById("serviceSelect").value;
        const display = document.getElementById("priceDisplay");
        if (val) {
            const s = JSON.parse(val);
            display.innerText = "₹" + s.price;
            document.getElementById("finalAmt").innerText = s.price;
        } else {
            display.innerText = "₹0.00";
        }
    }

    function showPayment() {
        const link = document.getElementById("targetLink").value;
        const service = document.getElementById("serviceSelect").value;
        if (!link || !service) return alert("Pehle Link aur Service chuno!");

        const s = JSON.parse(service);
        const upi = `upi://pay?pa=7388720012@fam&am=${s.price}&cu=INR&tn=Order_SMMbyAS`;
        document.getElementById("qrImg").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upi)}`;
        
        document.getElementById("qrSection").style.display = "block";
        document.getElementById("payBtn").style.display = "none";
    }

    async function submitToSheet() {
        const utr = document.getElementById("utrInput").value;
        const link = document.getElementById("targetLink").value;
        const serviceVal = JSON.parse(document.getElementById("serviceSelect").value);
        const btn = document.getElementById("confirmBtn");

        if (utr.length !== 12) {
            alert("❌ Galat UTR! PhonePe/GPay se 12-digit ka UPI Ref No daalo.");
            return;
        }

        btn.innerText = "Processing... ⏳";
        btn.disabled = true;

        const scriptURL = "https://script.google.com/macros/s/AKfycbyiswDLWgaSzHPO2WEly92eyaYRGs4hL6ZHlJhdCriOOrViHl-XYS4RoA7wsbHsBydJpQ/exec";

        try {
            await fetch(scriptURL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    link: link,
                    utr: utr,
                    service: serviceVal.name,
                    price: serviceVal.price
                })
            });

            alert("✅ Order Successful! 30 mins me check karke start kar diya jayega.");
            location.reload();
        } catch (e) {
            alert("Error! Please contact support.");
            btn.disabled = false;
            btn.innerText = "Confirm Payment";
        }
    }
</script>

</body>
</html>
