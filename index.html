<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Pro Order Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .screen { display: none; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; }
        .active { display: block; }
        .card { background: #fff; margin: 15px; padding: 20px; border-radius: 18px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 12px; outline: none; font-family: inherit; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }
        
        /* Status Badges */
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #b45309; }
        .processing { background: #e0f2fe; color: #0369a1; }
        .completed { background: #dcfce7; color: #15803d; }

        /* Navigation */
        .bottom-nav { display: flex; background: #fff; padding: 12px 0; border-top: 1px solid #f1f5f9; position: fixed; bottom: 0; width: 100%; max-width: 500px; z-index: 100; justify-content: space-around; }
        .nav-item { text-align: center; font-size: 11px; font-weight: 700; color: #94a3b8; cursor: pointer; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid #f1f5f9; text-align: left; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="padding: 60px 20px; text-align: center;">
            <h1 style="color:var(--primary); font-size:35px; letter-spacing:-1px;">SMMbyAS</h1>
            <div class="card">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-main" onclick="doLogin()">Login</button>
                <p onclick="toggleScreen('signup-screen')" style="margin-top:15px; cursor:pointer; font-weight:700; color:var(--primary);">Naya Account</p>
            </div>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div style="padding: 40px 20px;">
            <h2 style="text-align:center;">Register</h2>
            <div class="card">
                <input type="text" id="s-user" placeholder="Username">
                <input type="email" id="s-gmail" placeholder="Gmail">
                <input type="password" id="s-pass" placeholder="Password">
                <button class="btn-main" onclick="doSignup()">Create Account</button>
                <p onclick="toggleScreen('login-screen')" style="text-align:center; margin-top:15px; cursor:pointer;">Back</p>
            </div>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div style="padding: 20px; background: var(--primary); color: white; border-radius: 0 0 25px 25px;">
            <small>Welcome,</small>
            <h2 id="displayUser" style="margin:0;">User</h2>
            <div style="display:flex; gap:20px; margin-top:15px;">
                <div><small>Balance</small><br><b id="userBalDisplay">₹0</b></div>
                <div><small>Spent</small><br><b id="userSpentDisplay">₹0</b></div>
            </div>
        </div>

        <div id="order-tab" class="tab-content" style="padding: 10px;">
            <div class="card">
                <select id="serviceSelect" onchange="calculatePrice()">
                    <option value="0" data-rate="0">Choose Service</option>
                    <option value="65" data-rate="65">Insta Followers - ₹65</option>
                    <option value="2" data-rate="2">Insta Views - ₹2</option>
                </select>
                <input type="text" id="orderLink" placeholder="Link content...">
                <input type="number" id="orderQty" placeholder="Quantity" oninput="calculatePrice()">
                <div style="text-align:center; margin:15px 0;">
                    <small>Cost:</small><br>
                    <b id="finalPriceDisplay" style="font-size:24px; color:var(--primary);">₹0.00</b>
                </div>
                <button class="btn-main" onclick="handlePlaceOrder()">Place Order</button>
            </div>
        </div>

        <div id="history-tab" class="tab-content" style="display:none; padding: 10px;">
            <h3 style="margin-left:15px;">My Orders</h3>
            <div id="userOrderList"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active-nav" onclick="showTab('order-tab', this)"><i class="fas fa-plus-circle"></i>New</div>
            <div class="nav-item" onclick="showTab('history-tab', this); loadUserHistory()"><i class="fas fa-history"></i>History</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>Exit</div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="background:#1e293b; color:white; padding:20px;">
            <h3>Admin Master</h3>
            <div style="display:flex; justify-content:space-around; font-size:12px;">
                <span>Total Users: <b id="a-tu">0</b></span>
                <span>Balance: <b id="a-tb">0</b></span>
            </div>
        </div>

        <div style="display:flex; background:#f1f5f9; margin:10px; border-radius:10px;">
            <button onclick="showAdminTab('adm-users')" style="flex:1; padding:10px; border:none; background:none; font-weight:700;">Users</button>
            <button onclick="showAdminTab('adm-orders')" style="flex:1; padding:10px; border:none; background:none; font-weight:700;">Orders 🔔</button>
        </div>

        <div id="adm-users" class="adm-section" style="padding:10px;">
            <div class="card" style="overflow-x:auto;">
                <table id="adminUserTable">
                    <thead><tr><th>User</th><th>Pass</th><th>Bal</th><th>Del</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
            <div class="card">
                <h4>Add Balance</h4>
                <input type="text" id="admUser" placeholder="Username">
                <input type="number" id="admAmt" placeholder="Amount">
                <button class="btn-main" onclick="adminAddBal()">Add Now</button>
            </div>
        </div>

        <div id="adm-orders" class="adm-section" style="display:none; padding:10px;">
            <h3>Order History 📦</h3>
            <div id="adminOrderList"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_GOOGLE_SHEET_URL";
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let orders = JSON.parse(localStorage.getItem('smm_orders')) || [];
        let sessionUser = null;

        // --- AUTH ---
        function doSignup() {
            let u = document.getElementById('s-user').value.trim(), p = document.getElementById('s-pass').value, g = document.getElementById('s-gmail').value;
            if(!u || !p || db[u]) return alert("Error!");
            db[u] = { pass: p, gmail: g, bal: 0, spent: 0 };
            saveDB(); toggleScreen('login-screen');
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "suhel7388") { toggleScreen('admin-panel'); loadAdmin(); loadAdminOrders(); return; }
            if(db[u] && db[u].pass === p) { sessionUser = u; updateUI(); toggleScreen('user-panel'); } else alert("Wrong!");
        }

        // --- ORDER LOGIC ---
        function calculatePrice() {
            let sel = document.getElementById('serviceSelect');
            let rate = sel.options[sel.selectedIndex].getAttribute('data-rate');
            let qty = document.getElementById('orderQty').value;
            let final = (rate / 1000) * qty;
            document.getElementById('finalPriceDisplay').innerText = "₹" + final.toFixed(2);
        }

        function handlePlaceOrder() {
            let link = document.getElementById('orderLink').value;
            let qty = document.getElementById('orderQty').value;
            let cost = Number(document.getElementById('finalPriceDisplay').innerText.replace('₹',''));
            let srv = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;

            if(!link || qty < 10 || cost <= 0) return alert("Sahi details bharein!");
            if(db[sessionUser].bal < cost) return alert("Paisa kam hai!");

            // Paisa Kato
            db[sessionUser].bal -= cost;
            db[sessionUser].spent += cost;
            
            // Order Save Karo
            let newOrder = {
                id: Date.now(),
                user: sessionUser,
                service: srv,
                link: link,
                qty: qty,
                price: cost,
                status: "Pending", // Default Status
                date: new Date().toLocaleString()
            };
            orders.unshift(newOrder); // Naya order sabse upar
            saveDB();
            localStorage.setItem('smm_orders', JSON.stringify(orders));
            
            updateUI();
            alert("Order Success! Admin check karega.");
            document.getElementById('orderLink').value = "";
        }

        // --- USER HISTORY ---
        function loadUserHistory() {
            let container = document.getElementById('userOrderList');
            container.innerHTML = "";
            let userOrders = orders.filter(o => o.user === sessionUser);
            
            userOrders.forEach(o => {
                container.innerHTML += `
                <div class="card" style="margin-bottom:10px; border-left: 5px solid ${o.status=='Completed'?'#10b981':'#f59e0b'}">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${o.service}</b>
                        <span class="badge ${o.status.toLowerCase()}">${o.status}</span>
                    </div>
                    <div style="font-size:11px; color:#64748b; margin-top:5px;">
                        Qty: ${o.qty} | Price: ₹${o.price.toFixed(2)}<br>
                        Link: <a href="${o.link}">${o.link}</a><br>
                        Time: ${o.date}
                    </div>
                </div>`;
            });
        }

        // --- ADMIN ORDERS ---
        function loadAdminOrders() {
            let container = document.getElementById('adminOrderList');
            container.innerHTML = "";
            
            orders.forEach((o, index) => {
                container.innerHTML += `
                <div class="card">
                    <b>User: ${o.user}</b><br>
                    <small>${o.service} (${o.qty})</small><br>
                    <small>Link: ${o.link}</small><hr>
                    <div style="display:flex; gap:5px;">
                        <button onclick="changeStatus(${o.id}, 'Processing')" style="background:#e0f2fe; border:none; padding:5px; border-radius:5px; font-size:10px;">Processing</button>
                        <button onclick="changeStatus(${o.id}, 'Completed')" style="background:#dcfce7; border:none; padding:5px; border-radius:5px; font-size:10px;">Completed</button>
                        <button onclick="deleteOrder(${o.id})" style="background:#fee2e2; border:none; padding:5px; border-radius:5px; font-size:10px; color:red;">Delete</button>
                    </div>
                    <div style="margin-top:10px; font-weight:bold; color:var(--primary)">Status: ${o.status}</div>
                </div>`;
            });
        }

        function changeStatus(orderId, newStatus) {
            let order = orders.find(o => o.id === orderId);
            if(order) {
                order.status = newStatus;
                localStorage.setItem('smm_orders', JSON.stringify(orders));
                loadAdminOrders();
                alert("Status Updated to " + newStatus);
            }
        }

        function deleteOrder(orderId) {
            if(confirm("Order Delete Karein?")) {
                orders = orders.filter(o => o.id !== orderId);
                localStorage.setItem('smm_orders', JSON.stringify(orders));
                loadAdminOrders();
            }
        }

        // --- HELPERS ---
        function saveDB() { localStorage.setItem('smm_db', JSON.stringify(db)); }
        function toggleScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showTab(id, el) { document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav')); document.getElementById(id).style.display = 'block'; el.classList.add('active-nav'); }
        function showAdminTab(id) { document.querySelectorAll('.adm-section').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
        function updateUI() { 
            document.getElementById('userBalDisplay').innerText = "₹" + Number(db[sessionUser].bal).toFixed(2); 
            document.getElementById('userSpentDisplay').innerText = "₹" + Number(db[sessionUser].spent).toFixed(2);
            document.getElementById('displayUser').innerText = sessionUser;
        }
        function loadAdmin() {
            let body = document.getElementById('userTableBody'); body.innerHTML = "";
            let tU = 0, tB = 0;
            Object.keys(db).forEach(u => {
                tU++; tB += db[u].bal;
                body.innerHTML += `<tr><td>${u}</td><td>${db[u].pass}</td><td>₹${db[u].bal}</td><td><i class="fas fa-trash" onclick="deleteUser('${u}')"></i></td></tr>`;
            });
            document.getElementById('a-tu').innerText = tU; document.getElementById('a-tb').innerText = "₹" + tB.toFixed(0);
        }
        function adminAddBal() {
            let u = document.getElementById('admUser').value, a = Number(document.getElementById('admAmt').value);
            if(db[u]) { db[u].bal += a; saveDB(); loadAdmin(); alert("Added!"); }
        }
    </script>
</body>
</html>
