<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Ultimate Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #fff; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .screen { display: none; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; }
        .active { display: block; }
        .card { background: #fff; margin: 12px; padding: 18px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 12px; outline: none; font-family: inherit; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }
        
        /* Badges */
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #b45309; }
        .completed { background: #dcfce7; color: #15803d; }
        .processing { background: #e0f2fe; color: #0369a1; }

        /* Navigation */
        .bottom-nav { display: flex; background: #fff; padding: 12px 0; border-top: 1px solid #f1f5f9; position: fixed; bottom: 0; width: 100%; max-width: 500px; z-index: 100; justify-content: space-around; }
        .nav-item { text-align: center; font-size: 10px; font-weight: 700; color: #94a3b8; cursor: pointer; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }
        
        .tab-btn { flex:1; padding:10px; border:none; background:#f1f5f9; font-weight:700; font-size:12px; cursor:pointer; }
        .active-tab { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="padding: 60px 20px; text-align: center;">
            <h1 style="color:var(--primary); font-size:35px; letter-spacing:-1px;">SMMbyAS</h1>
            <div class="card">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-main" onclick="doLogin()">Login</button>
                <p onclick="toggleScreen('signup-screen')" style="margin-top:15px; cursor:pointer; font-weight:700; color:var(--primary);">Naya Account Banayein</p>
            </div>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div style="padding: 40px 20px;">
            <h2 style="text-align:center;">Register</h2>
            <div class="card">
                <input type="text" id="s-user" placeholder="Username">
                <input type="email" id="s-gmail" placeholder="Gmail">
                <input type="password" id="s-pass" placeholder="Password">
                <button class="btn-main" onclick="doSignup()">Create Account</button>
                <p onclick="toggleScreen('login-screen')" style="text-align:center; margin-top:15px; cursor:pointer;">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div style="padding: 20px; background: var(--primary); color: white; border-radius: 0 0 25px 25px;">
            <small>Welcome back,</small>
            <h2 id="displayUser" style="margin:0;">User</h2>
            <div style="display:flex; gap:20px; margin-top:15px;">
                <div><small>Balance</small><br><b id="userBalDisplay">₹0</b></div>
                <div><small>Spent</small><br><b id="userSpentDisplay">₹0</b></div>
            </div>
        </div>

        <div id="order-tab" class="tab-content" style="padding: 10px;">
            <div class="card">
                <select id="serviceSelect" onchange="calculatePrice()">
                    <option value="0" data-rate="0">Choose Service</option>
                    <option value="65" data-rate="65">Insta Followers - ₹65</option>
                    <option value="2" data-rate="2">Insta Views - ₹2</option>
                </select>
                <input type="text" id="orderLink" placeholder="Paste Link Here">
                <input type="number" id="orderQty" placeholder="Quantity" oninput="calculatePrice()">
                <div style="text-align:center; margin:10px 0;">
                    <small>Charge Amount:</small><br>
                    <b id="finalPriceDisplay" style="font-size:24px; color:var(--primary);">₹0.00</b>
                </div>
                <button class="btn-main" onclick="handlePlaceOrder()">Place Order Now</button>
            </div>
        </div>

        <div id="funds-tab" class="tab-content" style="display:none; padding: 10px;">
            <div class="card">
                <h3>Add Funds 💳</h3>
                <input type="number" id="payAmount" placeholder="Enter Amount (₹)" oninput="updateQR()">
                <div id="qrBox" style="display:none; text-align:center; padding:15px; background:#f8fafc; border-radius:15px; margin-bottom:15px;">
                    <img id="qrImg" style="width:160px; border-radius:12px; border:4px solid #fff;"><br>
                    <small><b>UPI: 7388720012@fam</b></small>
                </div>
                <input type="text" id="payTxn" placeholder="Enter 12 Digit UTR Number">
                <button class="btn-main" style="background:var(--success)" onclick="submitFundRequest()">Submit Payment Success</button>
            </div>
            <div id="userFundHistory" style="padding:0 10px;"></div>
        </div>

        <div id="history-tab" class="tab-content" style="display:none; padding: 10px;">
            <h3 style="margin-left:10px;">Order History 📦</h3>
            <div id="userOrderList"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active-nav" onclick="showTab('order-tab', this)"><i class="fas fa-shopping-bag"></i>New</div>
            <div class="nav-item" onclick="showTab('funds-tab', this); loadUserFundHistory()"><i class="fas fa-wallet"></i>Funds</div>
            <div class="nav-item" onclick="showTab('history-tab', this); loadUserOrderHistory()"><i class="fas fa-history"></i>Orders</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>Exit</div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="background:#1e293b; color:white; padding:20px;">
            <h3>Admin Panel</h3>
            <div style="display:flex; justify-content:space-around; font-size:12px;">
                <span>Total Users: <b id="a-tu">0</b></span>
                <span>Total Bal: <b id="a-tb">0</b></span>
            </div>
        </div>

        <div style="display:flex; padding:10px; gap:5px;">
            <button class="tab-btn active-tab" id="b1" onclick="showAdminTab('adm-users', 'b1')">Users</button>
            <button class="tab-btn" id="b2" onclick="showAdminTab('adm-orders', 'b2')">Orders</button>
            <button class="tab-btn" id="b3" onclick="showAdminTab('adm-funds', 'b3')">Funds Requests 🔔</button>
        </div>

        <div id="adm-users" class="adm-section" style="padding:10px;">
            <div class="card" style="overflow-x:auto;">
                <table>
                    <thead><tr><th>User</th><th>Pass</th><th>Bal</th><th>Action</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="adm-orders" class="adm-section" style="display:none; padding:10px;">
            <div id="adminOrderList"></div>
        </div>

        <div id="adm-funds" class="adm-section" style="display:none; padding:10px;">
            <div id="adminFundList"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let orders = JSON.parse(localStorage.getItem('smm_orders')) || [];
        let fundRequests = JSON.parse(localStorage.getItem('smm_funds')) || [];
        let sessionUser = null;

        // --- AUTH ---
        function doSignup() {
            let u = document.getElementById('s-user').value.trim(), p = document.getElementById('s-pass').value, g = document.getElementById('s-gmail').value;
            if(!u || !p || db[u]) return alert("Username error!");
            db[u] = { pass: p, gmail: g, bal: 0, spent: 0 };
            saveDB(); toggleScreen('login-screen');
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "suhel7388") { toggleScreen('admin-panel'); loadAdminData(); return; }
            if(db[u] && db[u].pass === p) { sessionUser = u; updateUI(); toggleScreen('user-panel'); } else alert("Wrong Login!");
        }

        // --- ORDER LOGIC ---
        function calculatePrice() {
            let sel = document.getElementById('serviceSelect'), rate = sel.options[sel.selectedIndex].getAttribute('data-rate'), qty = document.getElementById('orderQty').value;
            let final = (rate / 1000) * qty; document.getElementById('finalPriceDisplay').innerText = "₹" + final.toFixed(2);
        }

        function handlePlaceOrder() {
            let link = document.getElementById('orderLink').value, qty = document.getElementById('orderQty').value, cost = Number(document.getElementById('finalPriceDisplay').innerText.replace('₹',''));
            let srv = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;
            if(!link || qty < 10 || cost <= 0) return alert("Details bharein!");
            if(db[sessionUser].bal < cost) return alert("Low Balance!");

            db[sessionUser].bal -= cost; db[sessionUser].spent += cost;
            orders.unshift({ id: Date.now(), user: sessionUser, service: srv, link: link, qty: qty, price: cost, status: "Pending", date: new Date().toLocaleString() });
            saveAll(); updateUI(); alert("Order Placed!");
        }

        // --- FUND LOGIC ---
        function updateQR() {
            let a = document.getElementById('payAmount').value;
            document.getElementById('qrBox').style.display = a >= 1 ? "block" : "none";
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=upi://pay?pa=7388720012@fam%26am=${a}%26cu=INR`;
        }

        function submitFundRequest() {
            let a = Number(document.getElementById('payAmount').value), t = document.getElementById('payTxn').value;
            if(a < 1 || t.length < 10) return alert("Sahi Amount aur UTR bharein!");
            
            fundRequests.unshift({ id: Date.now(), user: sessionUser, amount: a, utr: t, status: "Pending", date: new Date().toLocaleString() });
            saveAll(); alert("Payment Submitted! Admin will verify.");
            document.getElementById('payAmount').value = ""; document.getElementById('payTxn').value = ""; updateQR();
        }

        // --- HISTORY LOADERS ---
        function loadUserOrderHistory() {
            let container = document.getElementById('userOrderList'); container.innerHTML = "";
            orders.filter(o => o.user === sessionUser).forEach(o => {
                container.innerHTML += `<div class="card"><b>${o.service}</b><br><small>Qty: ${o.qty} | Price: ₹${o.price}</small><br><span class="badge ${o.status.toLowerCase()}">${o.status}</span></div>`;
            });
        }

        function loadUserFundHistory() {
            let container = document.getElementById('userFundHistory'); container.innerHTML = "<h4>Funds History</h4>";
            fundRequests.filter(f => f.user === sessionUser).forEach(f => {
                container.innerHTML += `<div class="card"><b>₹${f.amount} Added</b><br><small>UTR: ${f.utr}</small><br><span class="badge ${f.status.toLowerCase()}">${f.status}</span></div>`;
            });
        }

        // --- ADMIN FUNCTIONS ---
        function loadAdminData() {
            // Users
            let uBody = document.getElementById('userTableBody'); uBody.innerHTML = "";
            let tU = 0, tB = 0;
            Object.keys(db).forEach(u => {
                tU++; tB += db[u].bal;
                uBody.innerHTML += `<tr><td>${u}</td><td>${db[u].pass}</td><td>₹${db[u].bal}</td><td><button onclick="deleteUser('${u}')">X</button></td></tr>`;
            });
            document.getElementById('a-tu').innerText = tU; document.getElementById('a-tb').innerText = "₹" + tB.toFixed(0);

            // Orders
            let oCont = document.getElementById('adminOrderList'); oCont.innerHTML = "";
            orders.forEach(o => {
                oCont.innerHTML += `<div class="card"><b>${o.user}</b> - ${o.service}<br><button onclick="updateStatus(${o.id}, 'Completed', 'order')">Mark Done</button> <span class="badge">${o.status}</span></div>`;
            });

            // Funds
            let fCont = document.getElementById('adminFundList'); fCont.innerHTML = "";
            fundRequests.filter(f => f.status === "Pending").forEach(f => {
                fCont.innerHTML += `<div class="card"><b>${f.user}</b> sent ₹${f.amount}<br>UTR: ${f.utr}<br><button style="background:green; color:white;" onclick="approveFund(${f.id})">APPROVE (Add Balance)</button></div>`;
            });
        }

        function approveFund(fundId) {
            let f = fundRequests.find(fr => fr.id === fundId);
            if(f && db[f.user]) {
                db[f.user].bal += f.amount;
                f.status = "Completed";
                saveAll(); loadAdminData(); alert("Balance Added to " + f.user);
            }
        }

        function updateStatus(id, stat, type) {
            if(type === 'order') { let o = orders.find(x => x.id === id); if(o) o.status = stat; }
            saveAll(); loadAdminData();
        }

        // --- HELPERS ---
        function saveDB() { localStorage.setItem('smm_db', JSON.stringify(db)); }
        function saveAll() { saveDB(); localStorage.setItem('smm_orders', JSON.stringify(orders)); localStorage.setItem('smm_funds', JSON.stringify(fundRequests)); }
        function toggleScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showTab(id, el) { document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav')); document.getElementById(id).style.display = 'block'; el.classList.add('active-nav'); }
        function showAdminTab(id, bId) { document.querySelectorAll('.adm-section').forEach(s => s.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); document.getElementById(id).style.display = 'block'; document.getElementById(bId).classList.add('active-tab'); }
        function updateUI() { document.getElementById('userBalDisplay').innerText = "₹" + Number(db[sessionUser].bal).toFixed(2); document.getElementById('userSpentDisplay').innerText = "₹" + Number(db[sessionUser].spent).toFixed(2); document.getElementById('displayUser').innerText = sessionUser; }
    </script>
</body>
</html>
