<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Professional Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        
        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; padding-bottom: 90px; }
        .active { display: block; }

        /* Dashboard Professional Style */
        .top-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .top-bar h2 { font-size: 20px; font-weight: 800; color: var(--primary); margin: 0; }
        
        .stat-container { padding: 15px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .stat-info small { color: #64748b; font-weight: 600; font-size: 12px; display: block; }
        .stat-info b { font-size: 22px; font-weight: 800; }

        /* Platform Icons */
        .plat-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 10px; }
        .plat-btn { width: 48px; height: 48px; background: #fff; border: 1.5px solid #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .plat-btn:hover, .plat-btn.active-plat { border-color: var(--primary); background: #f5f3ff; color: var(--primary); transform: translateY(-3px); }

        /* Form Elements */
        .card { background: #fff; margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #64748b; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; margin-bottom: 15px; font-family: inherit; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .calc-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px dashed #cbd5e1; margin-bottom: 20px; text-align: center; }
        .calc-box h4 { margin: 0; font-size: 24px; color: var(--primary); font-weight: 800; }

        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn-main:active { transform: scale(0.97); }

        /* Navigation */
        .bottom-nav { display: flex; background: #fff; padding: 12px 0; border-top: 1px solid #f1f5f9; position: fixed; bottom: 0; width: 100%; max-width: 500px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; font-weight: 700; color: #94a3b8; cursor: pointer; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 4px; }

        /* Admin Table */
        .adm-scroll { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px; background: #f8fafc; font-size: 11px; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="padding: 60px 30px; text-align: center;">
            <h1 style="color:var(--primary); font-size:40px; margin:0; letter-spacing:-1.5px;">SMMbyAS</h1>
            <div class="card" style="margin-top:40px;">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-main" onclick="doLogin()">Login</button>
                <p onclick="toggleScreen('signup-screen')" style="margin-top:20px; cursor:pointer; color:var(--primary); font-weight:700;">Create New Account</p>
            </div>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div style="padding: 40px 20px;">
            <h2 style="text-align:center;">Register</h2>
            <div class="card">
                <input type="text" id="s-user" placeholder="Username">
                <input type="email" id="s-gmail" placeholder="Gmail ID">
                <input type="password" id="s-pass" placeholder="Password">
                <button class="btn-main" style="background:var(--success)" onclick="doSignup()">Create Account</button>
                <p onclick="toggleScreen('login-screen')" style="text-align:center; margin-top:15px; cursor:pointer;">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div class="top-bar">
            <h2>SMMbyAS</h2>
            <div style="background:#f1f5f9; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700;">
                Hi, <span id="displayUser">User</span>
            </div>
        </div>

        <div class="stat-container">
            <div class="stat-card">
                <div class="stat-icon" style="background:#eef2ff; color:#6366f1;"><i class="fas fa-wallet"></i></div>
                <div class="stat-info"><small>Account Balance</small><b id="userBalDisplay">₹0.00</b></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fff7ed; color:#f59e0b;"><i class="fas fa-coins"></i></div>
                <div class="stat-info"><small>Spent Balance</small><b id="userSpentDisplay">₹0.00</b></div>
            </div>
        </div>

        <div id="order-tab" class="tab-content">
            <div class="plat-row">
                <div class="plat-btn" onclick="setPlat('insta', this)"><i class="fab fa-instagram"></i></div>
                <div class="plat-btn" onclick="setPlat('fb', this)"><i class="fab fa-facebook"></i></div>
                <div class="plat-btn" onclick="setPlat('yt', this)"><i class="fab fa-youtube"></i></div>
                <div class="plat-btn" onclick="setPlat('tele', this)"><i class="fab fa-telegram"></i></div>
                <div class="plat-btn" onclick="setPlat('tw', this)"><i class="fab fa-twitter"></i></div>
            </div>

            <div class="card">
                <label>Category / Service</label>
                <select id="serviceSelect" onchange="calculatePrice()">
                    <option value="0" data-rate="0">Choose Platform First</option>
                </select>

                <label>Link</label>
                <input type="text" id="orderLink" placeholder="https://instagram.com/p/...">

                <label>Quantity</label>
                <input type="number" id="orderQty" placeholder="Min: 100" oninput="calculatePrice()">

                <div class="calc-box">
                    <small style="font-weight:700; color:#64748b;">Charge Amount</small>
                    <h4 id="finalPriceDisplay">₹0.00</h4>
                </div>

                <button class="btn-main" id="placeBtn" onclick="handlePlaceOrder()">Place Order</button>
            </div>
        </div>

        <div id="funds-tab" class="tab-content" style="display:none;">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Add Funds</h3>
                <input type="number" id="payAmount" placeholder="Amount (₹)" oninput="updateQR()">
                <div id="qrBox" style="display:none; text-align:center; padding:15px; background:#f8fafc; border-radius:15px; margin-bottom:15px;">
                    <img id="qrImg" style="width:180px; border-radius:12px; border:4px solid #fff;"><br>
                    <small><b>7388720012@fam</b></small>
                </div>
                <input type="text" id="payTxn" placeholder="12 Digit Transaction ID">
                <button class="btn-main" style="background:#25d366" onclick="submitPayment()">
                    <i class="fab fa-whatsapp"></i> Pay via WhatsApp
                </button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active-nav" onclick="showTab('order-tab', this)"><i class="fas fa-shopping-cart"></i>Order</div>
            <div class="nav-item" onclick="showTab('funds-tab', this)"><i class="fas fa-wallet"></i>Add Funds</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>Logout</div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="background:#1e293b; color:white; padding:25px;">
            <h3>Admin Panel</h3>
            <div style="display:flex; gap:15px; font-size:12px;">
                <span>User: <b id="a-tu">0</b></span>
                <span>Bal: <b id="a-tb">₹0</b></span>
                <span>Spent: <b id="a-ts">₹0</b></span>
            </div>
        </div>

        <div class="card">
            <input type="text" id="admSearch" placeholder="🔍 Search username, email or pass..." onkeyup="adminSearch()">
            <div class="adm-scroll">
                <table>
                    <thead><tr><th>User</th><th>Pass</th><th>Bal</th><th>Spent</th><th>Action</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h4>Add Balance</h4>
            <input type="text" id="admUser" placeholder="Username">
            <input type="number" id="admAmt" placeholder="Amount">
            <button class="btn-main" onclick="adminAddBal()">Add Balance</button>
            <button class="btn-main" onclick="location.reload()" style="background:#64748b; margin-top:10px;">Exit Admin</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSXf_2hF77qbtFkLuqkrGt5qb9HEVtGmQqcesvkM9gdxF_hE_jf5jIBmnmXrQyiwf50A/exec";
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let sessionUser = null;

        const serviceData = {
            insta: [
                { n: "Instagram Real Followers - ₹65", r: 65 },
                { n: "Instagram Likes HQ - ₹12", r: 12 },
                { n: "Instagram Views - ₹2", r: 2 }
            ],
            fb: [
                { n: "Facebook Page Likes - ₹140", r: 140 },
                { n: "Facebook Profile Followers - ₹110", r: 110 }
            ],
            yt: [
                { n: "YouTube Subs (Non-Drop) - ₹280", r: 280 },
                { n: "YouTube Watch Time - ₹450", r: 450 }
            ],
            tele: [
                { n: "Telegram Members - ₹75", r: 75 }
            ],
            tw: [
                { n: "Twitter Followers - ₹350", r: 350 }
            ]
        };

        // --- CORE FUNCTIONS ---
        function setPlat(p, el) {
            document.querySelectorAll('.plat-btn').forEach(b => b.classList.remove('active-plat'));
            if(el) el.classList.add('active-plat');
            
            let sel = document.getElementById('serviceSelect');
            sel.innerHTML = '<option value="0" data-rate="0">Select Service</option>';
            if(serviceData[p]) {
                serviceData[p].forEach(s => {
                    let opt = document.createElement('option');
                    opt.text = s.n; opt.setAttribute('data-rate', s.r); sel.add(opt);
                });
            }
            calculatePrice();
        }

        function calculatePrice() {
            let sel = document.getElementById('serviceSelect');
            let qty = document.getElementById('orderQty').value || 0;
            let rate = sel.options[sel.selectedIndex].getAttribute('data-rate') || 0;
            let finalCost = (Number(rate) / 1000) * Number(qty);
            document.getElementById('finalPriceDisplay').innerText = "₹" + finalCost.toFixed(2);
        }

        async function handlePlaceOrder() {
            let link = document.getElementById('orderLink').value;
            let qty = document.getElementById('orderQty').value;
            let cost = Number(document.getElementById('finalPriceDisplay').innerText.replace('₹', ''));
            let srv = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;

            if(!link || qty < 10 || cost <= 0) return alert("Sahi details bharein!");
            if(Number(db[sessionUser].bal) < cost) return alert("Balance kam hai!");

            db[sessionUser].bal -= cost;
            db[sessionUser].spent = (db[sessionUser].spent || 0) + cost;
            localStorage.setItem('smm_db', JSON.stringify(db));
            updateUI();

            fetch(SCRIPT_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ type: "ORDER", user: sessionUser, service: srv, link: link, qty: qty, cost: cost, date: new Date().toLocaleString() }) 
            });

            alert("Order Success! Data Sheets mein bhej diya gaya hai.");
            document.getElementById('orderLink').value = ""; document.getElementById('orderQty').value = ""; calculatePrice();
        }

        function submitPayment() {
            let a = document.getElementById('payAmount').value, t = document.getElementById('payTxn').value;
            if(!a || t.length < 10) return alert("Sahi details daalein!");
            window.open(`https://wa.me/917388720012?text=*NEW FUND REQUEST*%0AUser: ${sessionUser}%0AAmount: ₹${a}%0AUTR: ${t}`);
        }

        // --- AUTH & UI ---
        function doSignup() {
            let u = document.getElementById('s-user').value.trim(), p = document.getElementById('s-pass').value, g = document.getElementById('s-gmail').value;
            if(!u || !p || db[u]) return alert("Username error!");
            db[u] = { pass: p, gmail: g, bal: 0, spent: 0 };
            localStorage.setItem('smm_db', JSON.stringify(db)); toggleScreen('login-screen');
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "suhel7388") { toggleScreen('admin-panel'); loadAdmin(); return; }
            if(db[u] && db[u].pass === p) { sessionUser = u; updateUI(); toggleScreen('user-panel'); } else alert("Wrong!");
        }

        function updateUI() {
            document.getElementById('userBalDisplay').innerText = "₹" + Number(db[sessionUser].bal).toFixed(2);
            document.getElementById('userSpentDisplay').innerText = "₹" + Number(db[sessionUser].spent || 0).toFixed(2);
            document.getElementById('displayUser').innerText = sessionUser;
        }

        function loadAdmin() {
            let body = document.getElementById('userTableBody'), tU = 0, tB = 0, tS = 0;
            body.innerHTML = "";
            Object.keys(db).forEach(u => {
                tU++; tB += Number(db[u].bal); tS += Number(db[u].spent);
                body.innerHTML += `<tr><td>${u}</td><td>${db[u].pass}</td><td style="color:green">₹${db[u].bal}</td><td>₹${db[u].spent}</td><td><i class="fas fa-trash" style="color:red" onclick="deleteUser('${u}')"></i></td></tr>`;
            });
            document.getElementById('a-tu').innerText = tU; document.getElementById('a-tb').innerText = "₹"+tB.toFixed(0); document.getElementById('a-ts').innerText = "₹"+tS.toFixed(0);
        }

        function adminSearch() {
            let f = document.getElementById('admSearch').value.toLowerCase();
            let rows = document.getElementById('userTableBody').getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) rows[i].style.display = rows[i].innerText.toLowerCase().includes(f) ? "" : "none";
        }

        function deleteUser(u) { if(confirm("Delete " + u + "?")) { delete db[u]; localStorage.setItem('smm_db', JSON.stringify(db)); loadAdmin(); } }
        function adminAddBal() {
            let u = document.getElementById('admUser').value, a = Number(document.getElementById('admAmt').value);
            if(db[u]) { db[u].bal += a; localStorage.setItem('smm_db', JSON.stringify(db)); loadAdmin(); alert("Success!"); }
        }

        function toggleScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showTab(id, el) { document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav')); document.getElementById(id).style.display = 'block'; el.classList.add('active-nav'); }
        function updateQR() {
            let a = document.getElementById('payAmount').value; document.getElementById('qrBox').style.display = a >= 1 ? "block" : "none";
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=7388720012@fam%26am=${a}%26cu=INR`;
        }
    </script>
</body>
</html>
