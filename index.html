    // Database Connection Function
    function handleAuth() {
        const user = document.getElementById('authUsername').value.trim();

        }

        if(authMode === 'signup') {

            }).then(() => {

            fetch(`${scriptURL}?action=checkUser&user=${user}&pass=${pass}`)
