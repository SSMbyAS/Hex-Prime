<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzh3uRQQ6vDP5QSK0aUNGuZQ_QxmFhM9dqlu-uwe5B8Hx3vLB8UIiMmQKRaK53WY2Hg/exec';
    let authMode = 'login';

    // Dropdown Data (Jo aapne screenshot mein dikhaya tha)
    const serviceData = {
        "ig_services": [
            {name: "📸 Instagram ➔ Likes", price: 5, qty: 1000},
            {name: "📸 Instagram ➔ Followers | Lifetime", price: 45, qty: 1000},
            {name: "📸 Instagram ➔ Views | Provider", price: 2, qty: 1000},
            {name: "📸 Instagram ➔ Story Views", price: 3, qty: 1000}
        ],
        "fb_services": [
            {name: "🔵 Facebook ➔ Post Like", price: 10, qty: 1000},
            {name: "🔵 Facebook ➔ Page Followers", price: 85, qty: 1000},
            {name: "🔵 Facebook ➔ Views", price: 60, qty: 1000}
        ]
    };

    // Signup aur Login Handle Karne ka Function
    function handleAuth() {
        const user = document.getElementById('authUsername').value.trim();
        const pass = document.getElementById('authPass').value.trim();
        const msg = document.getElementById('authMsg');

        if(!user || !pass) return msg.innerText = "Sari details bharein!";

        if(authMode === 'signup') {
            const email = document.getElementById('authEmail').value;
            const phone = document.getElementById('authPhone').value;
            
            msg.innerText = "Registering... Please wait.";
            
            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'signup',
                    user: user,
                    pass: pass,
                    email: email,
                    phone: phone
                })
            }).then(() => {
                alert("Account ban gaya! Ab Login karein.");
                location.reload();
            }).catch(err => {
                msg.innerText = "Error: Internet check karein.";
            });
        } else {
            msg.innerText = "Checking Login...";
            fetch(`${scriptURL}?action=checkUser&user=${user}&pass=${pass}`)
                .then(res => res.text())
                .then(status => {
                    if(status === "Valid") {
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('currentUser', user);
                        location.reload();
                    } else {
                        msg.innerText = "Galat Username ya Password!";
                    }
                });
        }
    }
</script>
