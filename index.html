<!DOCTYPE html>
<html>
<head><title>ADMIN PANEL</title></head>
<body style="background:#000; color:#fff; font-family:sans-serif; padding:20px;">
    <h2>SUHEL ADMIN - PENDING UTR</h2>
    <div id="list"></div>
    <script>
        function render() {
            const reqs = JSON.parse(localStorage.getItem('suhel_reqs') || '[]');
            const container = document.getElementById('list');
            container.innerHTML = "";
            reqs.forEach((r, i) => {
                if(r.status === 'pending') {
                    container.innerHTML += `<div style="border:1px solid #333; padding:10px; margin:10px;">
                        UTR: ${r.utr} | Device: ${r.dev} 
                        <button onclick="approve('${r.dev}', ${i})" style="background:#00ff41; padding:5px;">APPROVE (72H)</button>
                    </div>`;
                }
            });
        }
        function approve(dev, idx) {
            let apps = JSON.parse(localStorage.getItem('suhel_approvals') || '{}');
            let reqs = JSON.parse(localStorage.getItem('suhel_reqs') || '[]');
            // 72 Hours Expiry
            apps[dev] = { expiry: new Date().getTime() + (72 * 60 * 60 * 1000) };
            reqs[idx].status = 'approved';
            localStorage.setItem('suhel_approvals', JSON.stringify(apps));
            localStorage.setItem('suhel_reqs', JSON.stringify(reqs));
            alert("Approved!");
            render();
        }
        render();
    </script>
</body>
</html>
