<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEX PRIME PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
    </style>
</head>
<body>

    <nav class="bg-[#1a73e8] p-4 text-white flex justify-between items-center shadow-md">
        <div class="flex items-center gap-2">
            <i class="fas fa-shield-alt"></i>
            <span class="font-bold tracking-tight text-sm uppercase">HEX PRIME PANEL</span>
        </div>
        <i class="fas fa-bars"></i>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">

        <div class="bg-[#e6f4ea] border border-[#ceead6] rounded-lg p-5 text-center">
            <div class="bg-[#1e8e3e] text-white w-10 h-10 rounded-full flex items-center justify-center mx-auto mb-2 shadow-sm">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-[#137333] font-bold text-base">Key Generated Successfully!</h2>
            <p class="text-[#137333] text-[11px]">Your free key from HEX PRIME is ready to use.</p>
        </div>

        <div class="bg-white rounded shadow-sm border border-gray-100 overflow-hidden">
            <div class="bg-[#1a73e8] text-white p-2.5 text-center text-xs font-semibold flex justify-center items-center gap-2 uppercase tracking-wider">
                KEY DETAILS
            </div>
            
            <div class="p-5 text-center">
                <p class="text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-widest text-center">YOUR KEY</p>
                
                <div class="flex border-2 border-black rounded-md overflow-hidden mb-6">
                    <input id="keyOutput" type="text" readonly value="7545849" class="w-full p-2.5 text-center font-bold text-black bg-white outline-none text-base">
                    <button onclick="copyKey()" class="bg-gray-50 border-l px-4 text-blue-600 hover:bg-blue-100 transition-colors border-l-2 border-black">
                        <i class="far fa-copy text-lg"></i>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-y-6 border-b pb-6">
                    <div class="text-center">
                        <i class="fas fa-gamepad text-blue-500 mb-1"></i>
                        <p class="text-[9px] text-gray-400 uppercase font-black">Game</p>
                        <p class="text-xs font-bold text-gray-700">Free Fire Max</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-calendar-alt text-green-500 mb-1"></i>
                        <p class="text-[9px] text-gray-400 uppercase font-black">Duration</p>
                        <p class="text-xs font-bold text-gray-700">1 Days</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-mobile-alt text-blue-400 mb-1"></i>
                        <p class="text-[9px] text-gray-400 uppercase font-black">Devices</p>
                        <p class="text-xs font-bold text-gray-700">1 Device</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-gem text-yellow-500 mb-1"></i>
                        <p class="text-[9px] text-gray-400 uppercase font-black">Type</p>
                        <div class="inline-block bg-gray-500 text-white text-[9px] px-2 py-0.5 rounded font-bold uppercase">Free</div>
                    </div>
                </div>

                <div class="text-left pt-6 text-[11px] text-gray-500">
                    <div class="grid grid-cols-2 gap-y-3">
                        <div>
                            <p>Status:</p>
                            <span class="text-green-600 font-bold">Active</span>
                        </div>
                        <div>
                            <p>Provider:</p>
                            <p class="font-bold text-black uppercase">HEX PRIME</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const myKeys = ["5184507", "7545849"];

        window.onload = function() {
            // Check if user already has a key in this session
            let savedKey = localStorage.getItem('hex_user_key');
            if (!savedKey) {
                savedKey = myKeys[Math.floor(Math.random() * myKeys.length)];
                localStorage.setItem('hex_user_key', savedKey);
            }
            document.getElementById('keyOutput').value = savedKey;
        };

        function copyKey() {
            const input = document.getElementById('keyOutput');
            input.select();
            document.execCommand('copy');
            
            // Temporary alert for copy confirmation
            const btn = document.querySelector('button');
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check text-green-500"></i>';
            setTimeout(() => {
                btn.innerHTML = originalIcon;
            }, 2000);
        }
    </script>
</body>
</html>
